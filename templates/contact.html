{% extends 'base.html' %}
{% block title %}Contact — LuxeAura{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Contact Us</h1>
    <p>We'd love to hear from you</p>
</div>
<div class="container" style="max-width:600px;padding:2rem;">
    <div style="background:#fff;border:1px solid var(--light-border);border-radius:8px;padding:2.5rem;">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group"><label>Name</label>{{ form.name }}</div>
            <div class="form-group"><label>Email</label>{{ form.email }}</div>
            <div class="form-group"><label>Subject</label>{{ form.subject }}</div>
            <div class="form-group"><label>Message</label>{{ form.message }}</div>
            <button type="submit" class="btn btn-gold">Send Message</button>
        </form>
    </div>
</div>
{% endblock %}
