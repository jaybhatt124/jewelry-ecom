<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — LuxeAura</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold:#C9A84C; --gold-light:#E8C97A; --dark:#1A1614; }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Jost',sans-serif; background:var(--dark);
            min-height:100vh; display:flex; align-items:center;
            justify-content:center; padding:2rem; overflow:hidden; position:relative;
        }
        body::before{
            content:''; position:fixed; top:-30%; right:-20%;
            width:600px; height:600px; border-radius:50%;
            background:radial-gradient(circle,rgba(201,168,76,.07) 0%,transparent 70%);
            pointer-events:none;
        }
        .wrap{width:100%;max-width:420px;position:relative;z-index:1;}
        .logo{text-align:center;margin-bottom:2rem;}
        .logo h1{
            font-family:'Cormorant Garamond',serif;font-size:2.8rem;
            font-weight:300;color:var(--gold);letter-spacing:6px;text-transform:uppercase;
        }
        .logo h1 em{color:#fff;font-style:italic;}
        .logo p{font-size:.7rem;letter-spacing:4px;text-transform:uppercase;color:#666;margin-top:.4rem;}
        .card{
            background:rgba(255,255,255,.03);
            border:1px solid rgba(201,168,76,.2);
            border-radius:12px; padding:2.5rem;
        }
        .icon{
            width:64px;height:64px;border-radius:50%;
            background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);
            display:flex;align-items:center;justify-content:center;
            font-size:1.8rem;margin:0 auto 1.5rem;
        }
        h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:400;color:#fff;text-align:center;margin-bottom:.4rem;}
        .sub{font-size:.85rem;color:#666;text-align:center;margin-bottom:2rem;line-height:1.6;}
        .fg{margin-bottom:1.3rem;}
        .fg label{display:block;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:#888;margin-bottom:.5rem;}
        .fg input{
            width:100%;padding:.85rem 1rem;
            background:rgba(255,255,255,.05);
            border:1px solid rgba(255,255,255,.1);
            border-radius:6px;color:#fff;
            font-family:'Jost',sans-serif;font-size:.95rem;
            outline:none;transition:border-color .3s,background .3s;
        }
        .fg input:focus{border-color:var(--gold);background:rgba(201,168,76,.05);}
        .fg input::placeholder{color:#555;}
        .error{
            background:rgba(220,53,69,.1);border:1px solid rgba(220,53,69,.3);
            border-radius:6px;padding:.8rem 1rem;margin-bottom:1.2rem;
            font-size:.85rem;color:#f08090;
        }
        .btn{
            width:100%;padding:.95rem;background:var(--gold);color:var(--dark);
            border:none;border-radius:6px;font-family:'Jost',sans-serif;
            font-size:.85rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;
            cursor:pointer;transition:background .3s;
        }
        .btn:hover{background:var(--gold-light);}
        .back{text-align:center;margin-top:1.5rem;}
        .back a{font-size:.85rem;color:#666;text-decoration:none;transition:color .2s;}
        .back a:hover{color:var(--gold);}
    </style>
</head>
<body>
<div class="wrap">
    <div class="logo">
        <h1>Luxe<em>Aura</em></h1>
        <p>Fine Jewellery</p>
    </div>
    <div class="card">
        <div class="icon">🔑</div>
        <h2>Forgot Password?</h2>
        <p class="sub">Enter the email address linked to your account.<br>We will send you a 6-digit OTP.</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="fg">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="your@email.com" autofocus required>
            </div>
            <button type="submit" class="btn">Send OTP</button>
        </form>

        <div class="back">
            <a href="{% url 'login' %}">← Back to Sign In</a>
        </div>
    </div>
</div>
</body>
</html>
